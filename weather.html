<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
  }
  .hidden { display: none !important; }

  /* ── weather card ── */
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 48px 44px 36px;
    width: 380px;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    position: relative;
  }
  .city { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .region { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 28px; }
  .temp-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 8px; }
  .temp {
    font-size: 72px; font-weight: 200; line-height: 1;
    background: linear-gradient(180deg, #fff 30%, #a0c4ff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .condition { font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.8); margin-bottom: 32px; }
  .icon { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-size: 44px; }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 600; }
  .ip-row { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.3); }
  .loading { font-size: 18px; color: rgba(255,255,255,0.5); padding: 80px 0; }
  .error { color: #ff6b6b; font-size: 14px; padding: 40px 0; }
  .saved-tip { margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.25); }
  .saved-tip.fail { color: rgba(255,150,100,0.5); }
  .admin-btn { position: absolute; top: 12px; right: 14px; background: none; border: none; color: rgba(255,255,255,0.25); font-size: 18px; cursor: pointer; transition: color 0.2s; }
  .admin-btn:hover { color: rgba(255,255,255,0.7); }
  .push-bell {
    position: absolute; top: 12px; left: 14px; background: none; border: none;
    color: rgba(255,255,255,0.25); font-size: 16px; cursor: pointer; transition: color 0.2s;
  }
  .push-bell:hover { color: rgba(255,255,255,0.7); }
  .push-bell.active { color: #f0c040; }

  /* ── admin panel ── */
  .admin-panel {
    background: rgba(255,255,255,0.06); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 18px;
    padding: 32px; width: min(900px, 96vw); max-height: 90vh;
    display: flex; flex-direction: column; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .admin-panel h2 { font-size: 22px; margin-bottom: 6px; }
  .admin-panel .sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar button {
    padding: 6px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; font-size: 13px; transition: background 0.2s;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.16); }
  .toolbar button.danger { border-color: rgba(255,90,90,0.4); color: #ff6b6b; }
  .toolbar button.danger:hover { background: rgba(255,90,90,0.15); }
  .toolbar button.primary { background: rgba(100,180,255,0.2); border-color: rgba(100,180,255,0.4); }
  .toolbar button.primary:hover { background: rgba(100,180,255,0.3); }
  .tab-btn { padding: 8px 20px; border-radius: 10px 10px 0 0; border: 1px solid rgba(255,255,255,0.1); border-bottom: none; background: transparent; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 14px; transition: all 0.2s; margin-right: 4px; }
  .tab-btn.active { background: rgba(255,255,255,0.08); color: #fff; }
  .tab-btn:hover { color: #fff; }

  .table-wrap { flex: 1; overflow-y: auto; border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); }
  th { font-weight: 600; color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 0.5px; position: sticky; top: 0; background: #1a1835; }
  td { color: rgba(255,255,255,0.8); }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .empty { text-align: center; color: rgba(255,255,255,0.3); padding: 60px 0; font-size: 15px; }

  /* ── push settings ── */
  .push-form { padding: 10px 0; }
  .push-form label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
  .push-form input[type="text"] {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06);
    color: #fff; font-size: 14px; outline: none; margin-bottom: 20px;
  }
  .push-form input:focus { border-color: rgba(255,255,255,0.5); }
  .weather-checks { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .weather-checks label {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
    font-size: 13px; color: rgba(255,255,255,0.7); transition: all 0.2s;
  }
  .weather-checks label:hover { border-color: rgba(255,255,255,0.3); }
  .weather-checks input:checked + span { color: #fff; }
  .weather-checks label:has(input:checked) { border-color: rgba(255,200,60,0.5); background: rgba(255,200,60,0.1); }
  .push-status { margin-top: 12px; font-size: 13px; padding: 8px 12px; border-radius: 8px; }
  .push-status.success { background: rgba(0,200,100,0.1); color: #4ade80; }
  .push-status.info { background: rgba(100,180,255,0.1); color: #60a5fa; }

  /* ── login ── */
  .login-card {
    background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 18px;
    padding: 36px; width: 340px; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .login-card h2 { margin-bottom: 8px; font-size: 20px; }
  .login-card .hint { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }
  .login-card input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06);
    color: #fff; font-size: 15px; outline: none; margin-bottom: 16px;
  }
  .login-card input:focus { border-color: rgba(255,255,255,0.5); }
  .login-card button {
    width: 100%; padding: 10px; border-radius: 10px; border: none;
    background: rgba(255,255,255,0.15); color: #fff; font-size: 15px; cursor: pointer;
  }
  .login-card button:hover { background: rgba(255,255,255,0.25); }
  .login-err { color: #ff6b6b; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<!-- ────── main weather card ────── -->
<div class="card" id="card">
  <button class="push-bell" id="pushBtn" title="天气预警推送">🔔</button>
  <button class="admin-btn" id="adminBtn" title="管理面板">⚙</button>
  <div class="loading">正在获取天气...</div>
</div>

<!-- ────── login ────── -->
<div id="loginView" class="hidden">
  <div class="login-card">
    <h2>管理员登录</h2>
    <p class="hint" id="loginHint">请输入管理员密码</p>
    <input type="password" id="pwdInput" placeholder="密码" autocomplete="off">
    <button id="loginBtn">登录</button>
    <p class="login-err hidden" id="loginErr"></p>
  </div>
</div>

<!-- ────── push settings ────── -->
<div id="pushView" class="hidden">
  <div class="admin-panel">
    <div style="display:flex;gap:4px;margin-bottom:16px;">
      <button class="tab-btn active" id="pushTabBtn">📱 微信推送设置</button>
    </div>
    <div class="push-form">
      <label>Server酱 SendKey</label>
      <input type="text" id="sendkeyInput" placeholder="在 sct.ftqq.com 登录获取 SendKey">
      <p style="font-size:11px;color:rgba(255,255,255,0.3);margin:-12px 0 16px;">在 <a href="https://sct.ftqq.com/" target="_blank" style="color:rgba(255,255,255,0.4);">sct.ftqq.com</a> 用 GitHub 登录即可免费获取</p>

      <label>当前监控位置</label>
      <input type="text" id="pushLocation" readonly style="opacity:0.6;">

      <label>选择要预警的天气类型（可多选）</label>
      <div class="weather-checks" id="weatherChecks"></div>

      <div style="display:flex;gap:10px;margin-top:8px;">
        <button id="savePushBtn" class="toolbar button primary" style="flex:1;padding:10px;">保存并开启推送</button>
        <button id="cancelPushBtn" class="toolbar button" style="flex:1;padding:10px;">取消订阅</button>
        <button id="backFromPushBtn" class="toolbar button" style="padding:10px;">← 返回天气</button>
      </div>
      <div id="pushStatus" class="push-status hidden"></div>
    </div>
  </div>
</div>

<!-- ────── admin panel ────── -->
<div id="adminView" class="hidden">
  <div class="admin-panel">
    <div style="display:flex;gap:4px;margin-bottom:16px;">
      <button class="tab-btn active" id="recordsTabBtn">📋 历史记录</button>
      <button class="tab-btn" id="pushTabFromAdminBtn">📱 推送设置</button>
    </div>
    <div id="recordsTab">
      <p class="sub" id="recordCount">加载中...</p>
      <div class="toolbar">
        <button id="refreshBtn">刷新</button>
        <button id="exportBtn">导出 CSV</button>
        <button class="danger" id="clearBtn">清空全部</button>
        <button id="backBtn" style="margin-left:auto;">← 返回天气</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>时间</th><th>IP</th><th>城市</th><th>温度</th><th>风速</th><th>风向</th><th>天气</th><th>经度</th><th>纬度</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty hidden" id="emptyMsg">暂无记录</div>
      </div>
    </div>
    <div id="pushTab" class="hidden">
      <div class="push-form">
        <label>Server酱 SendKey</label>
        <input type="text" id="sendkeyInput2" placeholder="在 sct.ftqq.com 登录获取 SendKey">
        <p style="font-size:11px;color:rgba(255,255,255,0.3);margin:-12px 0 16px;">在 sct.ftqq.com 用 GitHub 登录即可免费获取</p>

        <label>当前监控位置</label>
        <input type="text" id="pushLocation2" readonly style="opacity:0.6;">

        <label>选择要预警的天气类型（可多选）</label>
        <div class="weather-checks" id="weatherChecks2"></div>

        <div style="display:flex;gap:10px;margin-top:8px;">
          <button id="savePushBtn2" class="toolbar button primary" style="flex:1;padding:10px;">保存并开启推送</button>
          <button id="cancelPushBtn2" class="toolbar button" style="flex:1;padding:10px;">取消订阅</button>
        </div>
        <div id="pushStatus2" class="push-status hidden"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   helpers
   ================================================================ */
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error((await res.text()) || `HTTP ${res.status}`);
  return res.json();
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

const conditions = {
  0:"晴天",1:"大部晴朗",2:"多云",3:"阴天",45:"雾",48:"雾凇",
  51:"小毛毛雨",53:"中毛毛雨",55:"大毛毛雨",56:"小冻毛毛雨",57:"大冻毛毛雨",
  61:"小雨",63:"中雨",65:"大雨",66:"小冻雨",67:"大冻雨",
  71:"小雪",73:"中雪",75:"大雪",77:"雪粒",
  80:"小阵雨",81:"中阵雨",82:"大阵雨",85:"小阵雪",86:"大阵雪",
  95:"雷暴",96:"雷暴伴小冰雹",99:"雷暴伴大冰雹"
};
const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",
  51:"🌧️",53:"🌧️",55:"🌧️",56:"🌧️",57:"🌧️",
  61:"🌧️",63:"🌧️",65:"🌧️",66:"🌧️",67:"🌧️",
  71:"❄️",73:"❄️",75:"❄️",77:"❄️",
  80:"🌦️",81:"🌦️",82:"🌦️",85:"🌨️",86:"🌨️",
  95:"⛈️",96:"⛈️",99:"⛈️"
};

// Last known geo data (populated by fetchWeather)
let lastGeo = null;

/* ================================================================
   fetch weather + render card
   ================================================================ */
async function fetchWeather() {
  const card = document.getElementById("card");

  let geo;
  try {
    const geoRes = await fetch("/api/geo");
    if (!geoRes.ok) throw new Error(`位置服务返回 ${geoRes.status}`);
    geo = await geoRes.json();
    if (geo.status !== "success") throw new Error(geo.message || "位置服务查询失败");
    lastGeo = { lat: geo.lat, lon: geo.lon, city: geo.city, region: geo.regionName, country: geo.country };
  } catch (e) {
    card.innerHTML = `<button class="push-bell" id="pushBtn" title="天气预警推送">🔔</button><button class="admin-btn" id="adminBtn" title="管理面板">⚙</button><div class="error">获取位置失败：${esc(e.message)}</div>`;
    bindBtns();
    return;
  }

  let cw;
  try {
    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${geo.lat}&longitude=${geo.lon}&current_weather=true`;
    const weatherRes = await fetch(weatherUrl);
    if (!weatherRes.ok) throw new Error(`Open-Meteo 返回 ${weatherRes.status}`);
    cw = (await weatherRes.json()).current_weather;
    if (!cw) throw new Error("未获取到天气数据");
  } catch (e) {
    card.innerHTML = `<button class="push-bell" id="pushBtn" title="天气预警推送">🔔</button><button class="admin-btn" id="adminBtn" title="管理面板">⚙</button><div class="error">获取天气失败：${esc(e.message)}</div>`;
    bindBtns();
    return;
  }

  const condition = conditions[cw.weathercode] || `Code ${cw.weathercode}`;

  card.innerHTML = `
    <button class="push-bell active" id="pushBtn" title="天气预警推送">🔔</button>
    <button class="admin-btn" id="adminBtn" title="管理面板">⚙</button>
    <div class="city">${esc(geo.city)}</div>
    <div class="region">${esc(geo.regionName)}, ${esc(geo.country)}</div>
    <div class="temp-row">
      <div class="icon">${icons[cw.weathercode] || "🌡️"}</div>
      <div class="temp">${cw.temperature}°</div>
    </div>
    <div class="condition">${condition}</div>
    <div class="grid">
      <div><div class="stat-label">风速</div><div class="stat-value">${cw.windspeed} <span style="font-size:12px;font-weight:400;">km/h</span></div></div>
      <div><div class="stat-label">风向</div><div class="stat-value">${cw.winddirection}°</div></div>
      <div><div class="stat-label">湿度</div><div class="stat-value">--</div></div>
    </div>
    <div class="ip-row">IP: ${esc(geo.query)} &nbsp;|&nbsp; ${geo.lat}, ${geo.lon}</div>
    <div class="saved-tip hidden" id="savedTip">✓ 已存入数据库</div>
  `;
  bindBtns();

  saveRecord({
    time: new Date().toISOString(),
    ip: geo.query,
    city: geo.city,
    region: geo.regionName,
    country: geo.country,
    lat: geo.lat,
    lon: geo.lon,
    temperature: cw.temperature,
    windspeed: cw.windspeed,
    winddirection: cw.winddirection,
    weathercode: cw.weathercode,
    condition
  });
}

function bindBtns() {
  const adminBtn = document.getElementById("adminBtn");
  const pushBtn = document.getElementById("pushBtn");
  if (adminBtn) adminBtn.addEventListener("click", showAdmin);
  if (pushBtn) pushBtn.addEventListener("click", showPush);
}

async function saveRecord(record) {
  const tip = document.getElementById("savedTip");
  try {
    await api("POST", "/api/records", record);
    if (tip) { tip.textContent = "✓ 已存入数据库"; tip.className = "saved-tip"; tip.classList.remove("hidden"); }
  } catch {
    if (tip) { tip.textContent = "⚠ 存储失败（服务端未运行）"; tip.className = "saved-tip fail"; tip.classList.remove("hidden"); }
  }
}

/* ================================================================
   push settings
   ================================================================ */
const alertWeatherCodes = [
  { code: 61, name: "小雨" },
  { code: 63, name: "中雨" },
  { code: 65, name: "大雨" },
  { code: 66, name: "冻雨" },
  { code: 67, name: "浓冻雨" },
  { code: 71, name: "小雪" },
  { code: 73, name: "中雪" },
  { code: 75, name: "大雪" },
  { code: 80, name: "小阵雨" },
  { code: 81, name: "中阵雨" },
  { code: 82, name: "大阵雨" },
  { code: 85, name: "小阵雪" },
  { code: 86, name: "大阵雪" },
  { code: 95, name: "雷暴" },
  { code: 96, name: "雷暴+小冰雹" },
  { code: 99, name: "雷暴+大冰雹" },
  { code: 45, name: "大雾" },
];

function renderWeatherChecks(containerId, selectedCodes) {
  const container = document.getElementById(containerId);
  container.innerHTML = alertWeatherCodes.map(({ code, name }) => `
    <label>
      <input type="checkbox" value="${code}" ${selectedCodes.includes(code) ? "checked" : ""}>
      <span>${icons[code] || "🌡"} ${name}</span>
    </label>
  `).join("");
}

function getSelectedCodes(containerId) {
  const container = document.getElementById(containerId);
  return [...container.querySelectorAll("input:checked")].map(cb => parseInt(cb.value));
}

function showPush() {
  document.getElementById("card").classList.add("hidden");
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("adminView").classList.add("hidden");
  document.getElementById("pushView").classList.remove("hidden");

  const locEl = document.getElementById("pushLocation");
  if (lastGeo) {
    locEl.value = `${lastGeo.city}, ${lastGeo.region} (${lastGeo.lat}, ${lastGeo.lon})`;
  } else {
    locEl.value = "请先在天气页面获取位置";
  }

  renderWeatherChecks("weatherChecks", []);
  document.getElementById("pushStatus").classList.add("hidden");

  // Load existing subscription
  const savedKey = localStorage.getItem("push_sendkey") || "";
  document.getElementById("sendkeyInput").value = savedKey;
  document.getElementById("sendkeyInput").focus();
}

// Save
async function savePush(sendkeyInputId, checksContainerId, statusId) {
  const sendkey = document.getElementById(sendkeyInputId).value.trim();
  if (!sendkey) { showStatus(statusId, "请输入 Server酱 SendKey", "info"); return; }
  if (!lastGeo) { showStatus(statusId, "请先在天气页面获取位置信息", "info"); return; }

  const codes = getSelectedCodes(checksContainerId);
  if (codes.length === 0) { showStatus(statusId, "请至少选择一种天气类型", "info"); return; }

  try {
    await api("PUT", "/api/subscription", {
      sendkey,
      codes,
      lat: lastGeo.lat,
      lon: lastGeo.lon,
      city: lastGeo.city
    });
    localStorage.setItem("push_sendkey", sendkey);
    showStatus(statusId, "✓ 推送已开启！服务端每10分钟轮询一次，匹配到选定天气时将推送到你的微信。", "success");
  } catch (e) {
    showStatus(statusId, `保存失败：${e.message}`, "info");
  }
}

// Cancel
async function cancelPush(sendkeyInputId, checksContainerId, statusId) {
  const sendkey = document.getElementById(sendkeyInputId).value.trim();
  if (!sendkey) return;
  try {
    await api("DELETE", "/api/subscription", { sendkey });
    document.getElementById(sendkeyInputId).value = "";
    renderWeatherChecks(checksContainerId, []);
    showStatus(statusId, "已取消订阅", "info");
  } catch (e) {
    showStatus(statusId, `取消失败：${e.message}`, "info");
  }
}

function showStatus(statusId, msg, cls) {
  const el = document.getElementById(statusId);
  el.textContent = msg;
  el.className = `push-status ${cls}`;
  el.classList.remove("hidden");
}

// Bind push view buttons (primary entry)
document.getElementById("savePushBtn").addEventListener("click", () => savePush("sendkeyInput", "weatherChecks", "pushStatus"));
document.getElementById("cancelPushBtn").addEventListener("click", () => cancelPush("sendkeyInput", "weatherChecks", "pushStatus"));
document.getElementById("backFromPushBtn").addEventListener("click", () => {
  document.getElementById("pushView").classList.add("hidden");
  document.getElementById("card").classList.remove("hidden");
});

// Bind admin tab push buttons

document.getElementById("cancelPushBtn2").addEventListener("click", () => cancelPush("sendkeyInput2", "weatherChecks2", "pushStatus2"));

// Tab switching in admin panel

/* ================================================================
   admin login
   ================================================================ */
function showLogin() {
  document.getElementById("card").classList.add("hidden");
  document.getElementById("adminView").classList.add("hidden");
  document.getElementById("pushView").classList.add("hidden");
  const view = document.getElementById("loginView");
  view.classList.remove("hidden");
  document.getElementById("loginHint").textContent = "请输入管理员密码";
  document.getElementById("pwdInput").value = "";
  document.getElementById("loginErr").classList.add("hidden");
  document.getElementById("pwdInput").focus();
}

/* ================================================================
   admin panel
   ================================================================ */
async function showAdmin() {
  document.getElementById("card").classList.add("hidden");
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("pushView").classList.add("hidden");
  document.getElementById("adminView").classList.remove("hidden");
  // Reset to records tab
  document.getElementById("recordsTab").classList.remove("hidden");
  document.getElementById("pushTab").classList.add("hidden");
  document.getElementById("recordsTabBtn").classList.add("active");
  document.getElementById("pushTabFromAdminBtn").classList.remove("active");
  await renderTable();
}

async function renderTable() {
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("emptyMsg");
  const count = document.getElementById("recordCount");
  try {
    const rows = await api("GET", "/api/records");
    count.textContent = `共 ${rows.length} 条记录`;
    if (rows.length === 0) { tbody.innerHTML = ""; empty.classList.remove("hidden"); return; }
    empty.classList.add("hidden");
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${fmtTime(r.time)}</td>
        <td>${esc(r.ip)}</td>
        <td>${esc(r.city)}, ${esc(r.country)}</td>
        <td>${r.temperature}°C</td>
        <td>${r.windspeed} km/h</td>
        <td>${r.winddirection}°</td>
        <td>${esc(r.condition)}</td>
        <td>${r.lon}</td>
        <td>${r.lat}</td>
      </tr>
    `).join("");
  } catch {
    count.textContent = "加载失败，请确认服务端已启动";
    tbody.innerHTML = "";
    empty.classList.remove("hidden");
  }
}

function fmtTime(iso) { const d = new Date(iso); const p = n => String(n).padStart(2, "0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

// Login
document.getElementById("loginBtn").addEventListener("click", async () => {
  const pwd = document.getElementById("pwdInput").value.trim();
  if (!pwd) return;
  try {
    const result = await api("POST", "/api/verify-password", { password: pwd });
    if (result.ok) { window._adminPwd = pwd; showAdmin(); return; }
    document.getElementById("loginErr").textContent = result.error || "密码错误";
    document.getElementById("loginErr").classList.remove("hidden");
  } catch {
    document.getElementById("loginErr").textContent = "无法连接服务端";
    document.getElementById("loginErr").classList.remove("hidden");
  }
  document.getElementById("pwdInput").value = "";
});
document.getElementById("pwdInput").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("loginBtn").click(); });

// Toolbar
document.getElementById("backBtn").addEventListener("click", () => { document.getElementById("adminView").classList.add("hidden"); document.getElementById("card").classList.remove("hidden"); });
document.getElementById("refreshBtn").addEventListener("click", renderTable);
document.getElementById("exportBtn").addEventListener("click", async () => {
  try {
    const rows = await api("GET", "/api/records");
    if (rows.length === 0) return;
    const csv = "时间,IP,城市,国家,经度,纬度,温度(°C),风速(km/h),风向(°),天气\n" + rows.map(r => `"${fmtTime(r.time)}","${r.ip}","${r.city}","${r.country}","${r.lon}","${r.lat}","${r.temperature}","${r.windspeed}","${r.winddirection}","${r.condition}"`).join("\n");
    const b = new Blob(["﻿" + csv], { type: "text/csv" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `weather_${new Date().toISOString().slice(0, 10)}.csv`; a.click();
  } catch { alert("导出失败，请确认服务端已启动"); }
});
document.getElementById("clearBtn").addEventListener("click", async () => {
  if (!confirm("确定要清空所有历史记录吗？此操作不可恢复。")) return;
  if (!window._adminPwd) { alert("请先重新登录"); return; }
  try {
    const result = await api("DELETE", "/api/records", { password: window._adminPwd });
    if (result.ok) await renderTable();
    else alert(result.error || "操作失败");
  } catch { alert("操作失败，请确认服务端已启动"); }
});

   start
   ================================================================ */
document.getElementById("card").addEventListener("click", e => {
  if (e.target.id === "adminBtn") showLogin();
  if (e.target.id === "pushBtn" || e.target.closest("#pushBtn")) showPush();
});
fetchWeather();
