<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
  }
  .hidden { display: none !important; }

  .card {
    background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 24px;
    padding: 48px 44px 36px; width: 380px; text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4); position: relative;
  }
  .city { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .region { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 28px; }
  .temp-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 8px; }
  .temp { font-size: 72px; font-weight: 200; line-height: 1; background: linear-gradient(180deg, #fff 30%, #a0c4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .condition { font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.8); margin-bottom: 32px; }
  .icon { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-size: 44px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1); }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 600; }
  .ip-row { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.3); }
  .loading { font-size: 18px; color: rgba(255,255,255,0.5); padding: 80px 0; }
  .error { color: #ff6b6b; font-size: 14px; padding: 40px 0; line-height: 1.6; }
  .saved-tip { margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.25); }
  .admin-btn { position: absolute; top: 12px; right: 14px; background: none; border: none; color: rgba(255,255,255,0.25); font-size: 18px; cursor: pointer; transition: color 0.2s; }
  .admin-btn:hover { color: rgba(255,255,255,0.7); }

  .admin-panel {
    background: rgba(255,255,255,0.06); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 18px;
    padding: 32px; width: min(900px, 96vw); max-height: 90vh;
    display: flex; flex-direction: column; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .admin-panel h2 { font-size: 22px; margin-bottom: 6px; }
  .admin-panel .sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar button { padding: 6px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; font-size: 13px; transition: background 0.2s; }
  .toolbar button:hover { background: rgba(255,255,255,0.16); }
  .toolbar button.danger { border-color: rgba(255,90,90,0.4); color: #ff6b6b; }
  .toolbar button.danger:hover { background: rgba(255,90,90,0.15); }
  .table-wrap { flex: 1; overflow-y: auto; border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); }
  th { font-weight: 600; color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 0.5px; position: sticky; top: 0; background: #1a1835; }
  td { color: rgba(255,255,255,0.8); }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .empty { text-align: center; color: rgba(255,255,255,0.3); padding: 60px 0; font-size: 15px; }

  .login-card {
    background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 18px;
    padding: 36px; width: 340px; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .login-card h2 { margin-bottom: 8px; font-size: 20px; }
  .login-card .hint { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }
  .login-card input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; font-size: 15px; outline: none; margin-bottom: 16px; }
  .login-card input:focus { border-color: rgba(255,255,255,0.5); }
  .login-card button { width: 100%; padding: 10px; border-radius: 10px; border: none; background: rgba(255,255,255,0.15); color: #fff; font-size: 15px; cursor: pointer; }
  .login-card button:hover { background: rgba(255,255,255,0.25); }
  .login-err { color: #ff6b6b; font-size: 13px; margin-top: 10px; }
  .note { margin-top: 12px; font-size: 11px; color: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<!-- weather card -->
<div class="card" id="card">
  <button class="admin-btn" id="adminBtn" title="管理面板">⚙</button>
  <div class="loading">正在获取天气...</div>
</div>

<!-- login -->
<div id="loginView" class="hidden">
  <div class="login-card">
    <h2>管理员登录</h2>
    <p class="hint">请输入管理员密码</p>
    <input type="password" id="pwdInput" placeholder="密码" autocomplete="off">
    <button id="loginBtn">登录</button>
    <p class="login-err hidden" id="loginErr"></p>
    <p class="note">默认密码: 111</p>
  </div>
</div>

<!-- admin panel -->
<div id="adminView" class="hidden">
  <div class="admin-panel">
    <h2>历史记录</h2>
    <p class="sub" id="recordCount">加载中...</p>
    <div class="toolbar">
      <button id="refreshBtn">刷新</button>
      <button id="exportBtn">导出 CSV</button>
      <button class="danger" id="clearBtn">清空全部</button>
      <button id="backBtn" style="margin-left:auto;">← 返回天气</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>时间</th><th>IP</th><th>城市</th><th>温度</th><th>风速</th><th>风向</th><th>天气</th><th>经度</th><th>纬度</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty hidden" id="emptyMsg">暂无记录</div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "weather_history";
const PWD_KEY = "admin_pwd";
const DEFAULT_PWD = "111";

function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; } catch { return []; } }
function save(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
function getPwd() { return localStorage.getItem(PWD_KEY)||DEFAULT_PWD; }
function setPwd(pw) { localStorage.setItem(PWD_KEY, pw); }

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

const conditions = {
  0:"晴天",1:"大部晴朗",2:"多云",3:"阴天",45:"雾",48:"雾凇",
  51:"小毛毛雨",53:"中毛毛雨",55:"大毛毛雨",56:"小冻毛毛雨",57:"大冻毛毛雨",
  61:"小雨",63:"中雨",65:"大雨",66:"小冻雨",67:"大冻雨",
  71:"小雪",73:"中雪",75:"大雪",77:"雪粒",
  80:"小阵雨",81:"中阵雨",82:"大阵雨",85:"小阵雪",86:"大阵雪",
  95:"雷暴",96:"雷暴伴小冰雹",99:"雷暴伴大冰雹"
};
const icons = {
  0:"☀",1:"🌤",2:"⛅",3:"☁",45:"🌫",48:"🌫",
  51:"🌧",53:"🌧",55:"🌧",56:"🌧",57:"🌧",
  61:"🌧",63:"🌧",65:"🌧",66:"🌧",67:"🌧",
  71:"❄",73:"❄",75:"❄",77:"❄",
  80:"🌦",81:"🌦",82:"🌦",85:"🌨",86:"🌨",
  95:"⛈",96:"⛈",99:"⛈"
};

async function fetchWeather() {
  const card = document.getElementById("card");
  try {
    // Step 1: get IP
    const ipRes = await fetch("https://api.ipify.org?format=json");
    if (!ipRes.ok) throw new Error("IP 查询失败");
    const ipData = await ipRes.json();

    // Step 2: get geo (try ipapi.co first, then fallback)
    let geo;
    try {
      const geoRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
      if (geoRes.ok) {
        geo = await geoRes.json();
        if (geo.error) throw new Error(geo.reason);
      } else {
        throw new Error("ipapi 查询失败");
      }
    } catch {
      // Fallback: use ip-api.com via http (works in some contexts)
      const geoRes = await fetch(`http://ip-api.com/json/${ipData.ip}?lang=zh-CN`);
      if (!geoRes.ok) throw new Error("位置查询失败");
      geo = await geoRes.json();
      if (geo.status !== "success") throw new Error(geo.message);
      geo = { ip: geo.query, city: geo.city, region: geo.regionName, country_name: geo.country, latitude: geo.lat, longitude: geo.lon };
    }

    // Step 3: get weather
    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current_weather=true`;
    const weatherRes = await fetch(weatherUrl);
    if (!weatherRes.ok) throw new Error("天气查询失败");
    const weather = await weatherRes.json();
    const cw = weather.current_weather;
    if (!cw) throw new Error("天气数据为空");
    const condition = conditions[cw.weathercode] || `Code ${cw.weathercode}`;

    card.innerHTML = `
      <button class="admin-btn" id="adminBtn" title="管理面板">⚙</button>
      <div class="city">${esc(geo.city)}</div>
      <div class="region">${esc(geo.region)}, ${esc(geo.country_name)}</div>
      <div class="temp-row"><div class="icon">${icons[cw.weathercode]||"🌡"}</div><div class="temp">${cw.temperature}°</div></div>
      <div class="condition">${condition}</div>
      <div class="grid">
        <div><div class="stat-label">风速</div><div class="stat-value">${cw.windspeed} <span style="font-size:12px;font-weight:400;">km/h</span></div></div>
        <div><div class="stat-label">风向</div><div class="stat-value">${cw.winddirection}°</div></div>
        <div><div class="stat-label">湿度</div><div class="stat-value">--</div></div>
      </div>
      <div class="ip-row">IP: ${esc(geo.ip||ipData.ip)} &nbsp;|&nbsp; ${geo.latitude}, ${geo.longitude}</div>
      <div class="saved-tip">✓ 已存入本地记录</div>
    `;
    document.getElementById("adminBtn").addEventListener("click", showLogin);

    const history = load();
    history.push({
      time: new Date().toISOString(),
      ip: geo.ip||ipData.ip,
      city: geo.city,
      region: geo.region||"",
      country: geo.country_name||"",
      lat: geo.latitude,
      lon: geo.longitude,
      temperature: cw.temperature,
      windspeed: cw.windspeed,
      winddirection: cw.winddirection,
      weathercode: cw.weathercode,
      condition
    });
    save(history.slice(-500));
  } catch (e) {
    card.innerHTML = `<button class="admin-btn" id="adminBtn" title="管理面板">⚙</button><div class="error">${esc(e.message)}</div>`;
    document.getElementById("adminBtn").addEventListener("click", showLogin);
  }
}

/* login */
function showLogin() {
  document.getElementById("card").classList.add("hidden");
  document.getElementById("adminView").classList.add("hidden");
  document.getElementById("loginView").classList.remove("hidden");
  document.getElementById("pwdInput").value = "";
  document.getElementById("loginErr").classList.add("hidden");
  document.getElementById("pwdInput").focus();
}

document.getElementById("loginBtn").addEventListener("click", () => {
  const pwd = document.getElementById("pwdInput").value.trim();
  if (!pwd) return;
  if (pwd === getPwd()) {
    showAdmin();
  } else {
    document.getElementById("loginErr").textContent = "密码错误";
    document.getElementById("loginErr").classList.remove("hidden");
  }
});
document.getElementById("pwdInput").addEventListener("keydown", e => { if (e.key==="Enter") document.getElementById("loginBtn").click(); });

/* admin */
function showAdmin() {
  document.getElementById("card").classList.add("hidden");
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("adminView").classList.remove("hidden");
  renderTable();
}

function renderTable() {
  const rows = [...load()].reverse();
  document.getElementById("recordCount").textContent = `共 ${rows.length} 条记录`;
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("emptyMsg");
  if (rows.length === 0) { tbody.innerHTML=""; empty.classList.remove("hidden"); return; }
  empty.classList.add("hidden");
  tbody.innerHTML = rows.map(r => `
    <tr><td>${fmtTime(r.time)}</td><td>${esc(r.ip)}</td><td>${esc(r.city)}, ${esc(r.country)}</td><td>${r.temperature}°C</td><td>${r.windspeed} km/h</td><td>${r.winddirection}°</td><td>${esc(r.condition)}</td><td>${r.lon}</td><td>${r.lat}</td></tr>
  `).join("");
}

function fmtTime(iso) { const d=new Date(iso); const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

document.getElementById("backBtn").addEventListener("click", ()=>{ document.getElementById("adminView").classList.add("hidden"); document.getElementById("loginView").classList.add("hidden"); document.getElementById("card").classList.remove("hidden"); });
document.getElementById("refreshBtn").addEventListener("click", renderTable);
document.getElementById("exportBtn").addEventListener("click", ()=>{
  const rows = load();
  if (!rows.length) return;
  const csv = "时间,IP,城市,国家,经度,纬度,温度(°C),风速(km/h),风向(°),天气\n" + rows.map(r=>`"${fmtTime(r.time)}","${r.ip}","${r.city}","${r.country}","${r.lon}","${r.lat}","${r.temperature}","${r.windspeed}","${r.winddirection}","${r.condition}"`).join("\n");
  const b = new Blob(["﻿"+csv],{type:"text/csv"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download=`weather_${new Date().toISOString().slice(0,10)}.csv`; a.click();
});
document.getElementById("clearBtn").addEventListener("click", ()=>{ if(confirm("清空所有记录？")){ localStorage.removeItem(STORAGE_KEY); renderTable(); } });
document.getElementById("card").addEventListener("click", e=>{ if(e.target.id==="adminBtn") showLogin(); });

fetchWeather();
</script>
</body>
</html>
